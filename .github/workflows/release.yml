name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env file
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          echo "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID" > .env
          echo "GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET" >> .env

      - name: Ad-hoc codesign (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # tauri-action이 빌드 후 .app에 서명하도록 환경변수 설정
          # ad-hoc 서명: "손상됨" 대신 "확인되지 않은 개발자" 경고로 변경
          echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PR Dashboard ${{ github.ref_name }}'
          releaseBody: |
            Cross-organization GitHub PR Dashboard.

            Download the appropriate file for your platform:
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Windows**: `.msi` or `.exe`
            - **Linux**: `.deb` or `.AppImage`

            > macOS: 코드 서명이 없으므로 첫 실행 시 우클릭 > 열기를 선택하세요.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
